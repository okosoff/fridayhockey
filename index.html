<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phan's Friday Night Hockey Signup</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; background-color: #f5f5f5; }
    h1, h2 { text-align: center; }
    form { max-width: 400px; margin: 0 auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    label { display: block; margin-top: 1rem; }
    input { width: 100%; padding: 0.5rem; margin-top: 0.5rem; border-radius: 4px; border: 1px solid #ccc; }
    button { margin-top: 1.5rem; padding: 0.75rem; width: 100%; border: none; background-color: #007BFF; color: white; font-size: 1rem; border-radius: 4px; cursor: pointer; }
    button:hover { background-color: #0056b3; }
    .message { margin-top: 1rem; text-align: center; font-weight: bold; }
    .spot-count { text-align: center; margin-bottom: 1rem; font-weight: bold; }
    .admin-control { display: none; text-align: center; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <h1>Phan's Friday Night Hockey Signup</h1>

  <div class="spot-count">Spots Available: <span id="spots">3</span></div>

  <form id="signupForm">
    <label for="fullName">Full Name:</label>
    <input type="text" id="fullName" name="fullName" required>

    <label for="phone">Phone Number:</label>
    <input type="tel" id="phone" name="phone" required>

    <button type="submit">Sign Up</button>
  </form>

  <div class="message" id="message"></div>

  <div style="text-align:center; margin-top: 2rem;">
    <h2>Game Details</h2>
    <p>Every Friday @ 9:30 PM<br>Vollmer Complex</p>
  </div>

  <div class="admin-control" id="adminPanel">
    <label for="adminPassword">Admin Password:</label>
    <input type="password" id="adminPassword">
    <button onclick="verifyAdmin()">Enter</button>

    <div id="adminControls" style="display:none; margin-top: 1rem;">
      <label for="maxSpots">Set Available Spots:</label>
      <input type="number" id="maxSpots" value="3" min="0">
      <button onclick="updateSpots()">Update Spots</button>
    </div>
  </div>

  <script>
    let spots = 3;
    let waitlist = [];

    const spotsDisplay = document.getElementById('spots');
    const messageDiv = document.getElementById('message');
    const form = document.getElementById('signupForm');
    const adminControls = document.getElementById('adminControls');
    const adminPanel = document.getElementById('adminPanel');

    function verifyAdmin() {
      const password = document.getElementById('adminPassword').value;
      if (password === 'phanadmin') {  // Change this password to your private one
        adminControls.style.display = 'block';
      } else {
        alert('Incorrect password.');
      }
    }

    function updateSpots() {
      const input = document.getElementById('maxSpots');
      const newSpots = parseInt(input.value, 10);
      if (!isNaN(newSpots) && newSpots >= 0) {
        spots = newSpots;
        spotsDisplay.textContent = spots;
        messageDiv.textContent = 'Spot limit updated.';
        messageDiv.style.color = 'blue';
      }
    }

    form.addEventListener('submit', function(event) {
      event.preventDefault();

      const fullName = document.getElementById('fullName').value.trim();
      const phone = document.getElementById('phone').value.trim();

      if (!fullName || !phone) {
        messageDiv.textContent = 'Please fill in all fields.';
        messageDiv.style.color = 'red';
        return;
      }

      if (spots > 0) {
        spots--;
        spotsDisplay.textContent = spots;
        messageDiv.innerHTML = `Thank you, <strong>${fullName}</strong>! You have secured a spot. <br>
          Please e-transfer <strong>$15</strong> to <em>okosoff@outlook.com</em> to confirm your spot. <br>
          After sending, please notify me via email.`;
        messageDiv.style.color = 'green';
      } else {
        waitlist.push({ name: fullName, phone });
        const position = waitlist.length;
        messageDiv.innerHTML = `Hi <strong>${fullName}</strong>, all spots are currently taken. <br>
          You have been added to the waitlist (position #${position}).`;
        messageDiv.style.color = 'orange';
      }

      form.reset();
    });

    // Optional: Uncomment to show admin panel automatically for you
    // adminPanel.style.display = 'block';
  </script>
</body>
</html>
