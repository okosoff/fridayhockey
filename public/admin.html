<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #1e1e1e;
    color: white;
    padding: 20px;
}

/* TOP BUTTON ROW */
.control-row {
    display: flex;
    justify-content: flex-start;
    gap: 10px;
    flex-wrap: wrap;
}

/* BUTTON STYLE */
.btn {
    padding: 10px 14px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    color: white;
}

/* MAINTENANCE LEFT ALIGN */
.maintenance-inline {
    width: 100%;
    display: flex;
    justify-content: flex-start;
    margin-top: 15px;
}

/* PILL */
.maintenance-pill {
    padding: 8px 16px;
    border-radius: 25px;
    background: #2e7d32;
    cursor: pointer;
}

.maintenance-pill.active {
    background: #c62828;
}
</style>
</head>

<body>

<h1>ADMIN DASHBOARD</h1>

<div class="control-row">
    <button class="btn" style="background:#2e7d32">Download Backup</button>
    <button class="btn" style="background:#5c6bc0">Preview Latest</button>
    <button class="btn" style="background:#3f51b5">Restore Latest</button>
    <button class="btn" style="background:#8e24aa">Restore Backup</button>
</div>

<div class="maintenance-inline">
    <div id="maintenanceToggle" class="maintenance-pill">
        Maintenance Mode OFF
    </div>
</div>

<script>
const btn = document.getElementById('maintenanceToggle');
let isOn = false;

btn.addEventListener('click', () => {
    isOn = !isOn;
    if (isOn) {
        btn.classList.add('active');
        btn.innerText = 'Maintenance Mode ON';
    } else {
        btn.classList.remove('active');
        btn.innerText = 'Maintenance Mode OFF';
    }
});
</script>

</body>
</html>
